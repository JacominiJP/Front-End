<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página para criar uma conta na Comunidade da Organizada Umamusue">
    <meta name="keywords" content="pagina, criar conta, comunidade">
    <link rel="icon" type="image/x-icon" href="../../icones/goldship.ico">
    <link rel="stylesheet" href="../../CSS/cadastrostyle.css">
    <title>Cadastro</title>
</head>

<body>  
    <!--Formulário-->
    <main class="container">
        <form>
            <h1>CADASTRAR-SE</h1>

            <!--Caixas de Textos-->
            <div class="input-box">
                <input placeholder="Nome de Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="E-mail" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Telefone" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder=" Criar Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="input-box">
                <input placeholder="Confirmar Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>
            <!--Botão de Criar Conta-->
            <button type="submit" class="cadastro">CRIAR CONTA</button>

        </form>

    </main>

</body>

</html>

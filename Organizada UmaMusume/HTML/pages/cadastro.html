<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de cadastro para o site Uma Musume. Cadastre-se para acessar conteúdos exclusivos e participar da comunidade.">
    <meta name="keywords" content="cadastro, uma musume, criar conta, registro, comunidade uma musume">
    <link rel="icon" type="image/x-icon" href="../../icones/goldship.ico">
    <link rel="stylesheet" href="../../CSS/cadastrostyle.css">
    <title>Cadastro</title>
</head>

<body>  
    <main class="container">
        <form>
            <h1>Cadastro</h1>
            <div class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                <label>
                <a href="#">Esqueci a senha</a>
            </div>

            <button type="submit" class="login">Login</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
            </div>
        </form>

    </main>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de Login e cadastro para o site Uma Musume. Logar ou Cadastre-se para acessar conteúdos exclusivos e participar da comunidade.">
    <meta name="keywords" content="login, logar, cadastro, uma musume, criar conta, registro, comunidade uma musume">
    <link rel="icon" type="image/x-icon" href="../../icones/goldship.ico">
    <link rel="stylesheet" href="../../CSS/loginstyle.css">
    <title>Login</title>
</head>

<body>  
    <main class="container">
        <form>
            <h1>LOGIN</h1>
            <!--Caixas de Textos-->
            <div class="input-box">
                <input placeholder="Usuário ou E-mail" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>
            <!--Lembrar ou Esqueceu a Senha-->
            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                <label>
                <a href="#">Esqueci a senha</a>
            </div>
            <!--Botão de Logar-->
            <button type="submit" class="login">Logar</button>
            <!--Link Para Criar uma Conta-->
            <div class="register-link">
                <p>Não tem uma conta? <a href="../pages/cadastro.html">Cadastre-se</a></p>
            </div>
        </form>

    </main>

</body>

</html>

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Página para realização dos pagamentos dos produtos do site"
    />
    <meta
      name="keywords"
      content="Página, pagamentos, pagamento, produtos, realização, site"
    />
    <link rel="icon" type="image/x-icon" href="../../icones/goldship.ico" />
    <link rel="stylesheet" href="../../CSS/pagamentostyle.css" />
    <title>Pagamento</title>
  </head>
  <body>
    <main class="container">

        <form class="pagamento">

            <h2>Digite Seu Dados</h2>
        <div class="num-cartao">
          <input
            type="text"
            name="nume-cartao"
            placeholder="Número do Cartão"
          />
        </div>

        <div class="validade">
          <input  class="tamanho-validade" type="text" name="vali" placeholder="MM/AA" />
        </div>

        <div class="cvc">
          <input class="tamanho-cvc" type="text" name="cod-seguranca" placeholder="CVC" />
        </div>

        <div class="nome-titular">
          <input
            type="text"
            name="nome-titular"
            placeholder="Nome Titular do Cartão"
          />
        </div>

        <div class="aceitar-termos">
          <input type="checkbox" name="termos" /><p>Salvar todos os dados para pagar mais Rápido na Próxima Compra?</p>
        </div>

        <button class="confirmar">PAGAR AGORA</button>
        </form 2    >
    </main>
  </body>
</html>
